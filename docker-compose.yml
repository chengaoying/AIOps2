services:
  # Frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - diagnosis-api
    networks:
      - AIOps
    restart: unless-stopped

  # ==================== Go Services ====================

  # Collector Agent
  collector:
    build:
      context: ./go/cmd/collector
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - GIN_MODE=release
      - STARROCKS_HOST=starrocks
      - STARROCKS_PORT=9030
    depends_on:
      - starrocks
    networks:
      - AIOps
    restart: unless-stopped

  # Diagnosis API
  diagnosis-api:
    build:
      context: ./go/cmd/diagnosis-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - STARROCKS_HOST=starrocks
      - STARROCKS_PORT=9030
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - starrocks
      - redis
    networks:
      - AIOps
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Java Services ====================

  # Knowledge Base API
  knowledge-base-api:
    build:
      context: ./java/knowledge-base-api
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - ES_HOST=elasticsearch
      - ES_PORT=9200
      - STARROCKS_HOST=starrocks
      - STARROCKS_PORT=9030
    depends_on:
      - milvus
      - elasticsearch
      - starrocks
    networks:
      - AIOps
    restart: unless-stopped

  # Alert Manager
  alert-manager:
    build:
      context: ./java/alert-manager
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - STARROCKS_HOST=starrocks
      - STARROCKS_PORT=9030
      - SMTP_HOST=smtp.example.com
      - SMTP_PORT=587
    depends_on:
      - starrocks
    networks:
      - AIOps
    restart: unless-stopped

  # ==================== Storage Services ====================

  starrocks:
    image: starrocks/centos-env:2.5.9
    ports:
      - "9030:9030"
      - "8030:8030"
      - "8040:8040"
    volumes:
      - starrocks_data:/opt/starrocks/fe/meta
    networks:
      - AIOps
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - AIOps
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Vector DB - Milvus ====================

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - etcd_data:/etcd
    networks:
      - AIOps
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"
    networks:
      - AIOps
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v3.1.0
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    networks:
      - AIOps
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Search - Elasticsearch ====================

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - AIOps
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  starrocks_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  es_data:

networks:
  AIOps:
    driver: bridge