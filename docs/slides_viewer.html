<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sqlscan在B站的实践 - Slides Viewer</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #333; color: white; }
        .slide { max-width: 1000px; margin: 20px auto; border: 2px solid #666; }
        .slide img { width: 100%; height: auto; }
        h1 { text-align: center; }
        .nav { text-align: center; padding: 20px; background: #222; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <h1>Sqlscan在B站的实践 - 张巍</h1>
    <div id="slides"></div>
    <script>
        const totalSlides = 32;
        for (let i = 1; i <= totalSlides; i++) {
            let num = i.toString().padStart(2, '0');
            document.write('<div class="slide"><h3>Slide ' + i + '</h3><img src="https://sslprod.oss-cn-shanghai.aliyuncs.com/stable/slides/571916/571916_1440-' + num + '.jpg" /></div>');
        }
    </script>
</body>
</html>
